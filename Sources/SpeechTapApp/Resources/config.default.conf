# speech-tap 既定設定（バンドル同梱フォールバック）。
# 実値は ~/.config/speech-tap/config.conf を作成して上書きする（そちらが優先される）。
# 固定要件: 対象アプリ識別子・認識言語・出力先はここに分離し、コードに直書きしない。

# 文字化対象アプリの識別子（AppEnumerator が返す AppId.rawValue = bundleId）。未指定なら UI で選択する。
TARGET_APP_ID=

# 認識言語（BCP-47）。例: ja-JP / en-US。省略時は ja-JP。
LOCALE=ja-JP

# 確定文字起こしの出力先パス（必須）。
OUTPUT_PATH=~/Downloads/speech-tap/transcript.txt

# LLM transcript 校正（任意）。true の場合だけ configured OpenAI 互換 API を呼ぶ。
# 既定は無効にし、音声・テキストを外部送信しない従来挙動を維持する。
LLM_CORRECTION_ENABLED=false
LLM_API_BASE_URL=
LLM_API_KEY=
LLM_MODEL=
LLM_TEMPERATURE=0
LLM_TIMEOUT_SECONDS=180
LLM_MAX_TOKENS=
LLM_DISABLE_THINKING=false
