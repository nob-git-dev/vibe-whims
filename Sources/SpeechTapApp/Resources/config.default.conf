# speech-tap 既定設定（バンドル同梱フォールバック）。
# 実値は ~/.config/speech-tap/config.conf を作成して上書きする（そちらが優先される）。
# 固定要件: 対象アプリ識別子・認識言語・出力先はここに分離し、コードに直書きしない。

# 文字化対象アプリの識別子（AppEnumerator が返す AppId.rawValue = bundleId）。未指定なら UI で選択する。
TARGET_APP_ID=

# 認識言語（BCP-47）。例: ja-JP / en-US。省略時は ja-JP。
LOCALE=ja-JP

# 確定文字起こしの出力先パス（必須）。
OUTPUT_PATH=~/Documents/speech-tap/transcript.txt
