# speech-tap 設定ファイル（例 / KEY=VALUE 形式）。
# 実値は config.conf 等にコピーして編集し、ConfigLoader.load(from:) に渡す。
# 固定要件: 対象アプリ識別子・認識言語・出力先はここに分離し、コードに直書きしない。
# 機密値・パスをソースコードに直書きしないこと。

# 文字化対象アプリの識別子（AppEnumerator が返す AppId.rawValue）。未指定なら UI で選択する。
TARGET_APP_ID=

# 認識言語（BCP-47）。例: ja-JP / en-US。省略時は ja-JP。
LOCALE=ja-JP

# 確定文字起こしの出力先パス（必須）。
OUTPUT_PATH=~/Downloads/speech-tap/transcript.txt

# LLM transcript 校正（任意）。true の場合だけ、停止後のセッション原文を
# OpenAI 互換 API に送り、Downloads に corrected ファイルを別途作成する。
# 既定は false。通常の transcript.txt と speech-tap-*.txt は原文のまま維持される。
LLM_CORRECTION_ENABLED=false
LLM_API_BASE_URL=http://192.168.3.18:30000/v1
LLM_API_KEY=
LLM_MODEL=qwen3.5-122b
LLM_TEMPERATURE=0
LLM_TIMEOUT_SECONDS=300
# 長文校正用の completion token 上限。空なら API 既定値を使う。
LLM_MAX_TOKENS=32768
# qwen3.5-122b などの thinking model 向け。true の場合は
# chat_template_kwargs.enable_thinking=false を OpenAI 互換 JSON body に送る。
# 未対応の OpenAI 互換 API では timeout や 400 の原因になるため false にする。
LLM_DISABLE_THINKING=true
